<!-- ========================= -->
<!-- FINAL EDUCATIONAL PLATFORM -->
<!-- ========================= -->

<script>

/* ========================= */
/* LOGIN */
/* ========================= */

const ADMIN_USERNAME = "admin";
const ADMIN_PASSWORD = "123456";

document.getElementById('platform').style.display='none';

document.getElementById('login-btn')
.addEventListener('click',()=>{

  const username =
  document.getElementById('admin-username').value;

  const password =
  document.getElementById('admin-password').value;

  if(
    username === ADMIN_USERNAME &&
    password === ADMIN_PASSWORD
  ){

    document.getElementById('login-page').style.display='none';

    document.getElementById('platform').style.display='block';

  }else{

    document.getElementById('login-error')
    .classList.remove('hidden');

  }

});

/* ========================= */
/* ELEMENTS */
/* ========================= */

const homeBtn =
document.getElementById('home-btn');

const homePage =
document.getElementById('home-page');

const subjectsPage =
document.getElementById('subjects-page');

const toggleSubjectsBtn =
document.getElementById('toggle-subjects');

const levelPage =
document.getElementById('level-page');

const levelTitle =
document.getElementById('level-title');

const levelSubjectsContainer =
document.getElementById('level-subjects-container');

const levelsList =
document.getElementById('levels-list');

const backToLevels =
document.getElementById('back-to-levels');

/* ========================= */
/* NAVIGATION */
/* ========================= */

homeBtn.addEventListener('click',(e)=>{

  e.preventDefault();

  homePage.classList.remove('hidden');

  subjectsPage.classList.add('hidden');

});

toggleSubjectsBtn.addEventListener('click',(e)=>{

  e.preventDefault();

  homePage.classList.add('hidden');

  subjectsPage.classList.remove('hidden');

});

backToLevels.addEventListener('click',()=>{

  levelPage.classList.add('hidden');

  levelsList.classList.remove('hidden');

});

/* ========================= */
/* LOGO SAVE */
/* ========================= */

const logoInput =
document.getElementById('logo-input');

const sidebarLogo =
document.getElementById('sidebar-logo');

const mainLogo =
document.getElementById('main-logo');

function loadSavedLogo(){

  const savedLogo =
  localStorage.getItem('platformLogo');

  if(savedLogo){

    sidebarLogo.innerHTML = `
      <img
      src="${savedLogo}"
      class="w-full h-full object-cover">
    `;

    mainLogo.innerHTML = `
      <img
      src="${savedLogo}"
      class="w-full h-full object-contain rounded-[25px]">
    `;

  }

}

logoInput.addEventListener('change',(e)=>{

  const file = e.target.files[0];

  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(event){

    const imageSrc =
    event.target.result;

    localStorage.setItem(
      'platformLogo',
      imageSrc
    );

    sidebarLogo.innerHTML = `
      <img
      src="${imageSrc}"
      class="w-full h-full object-cover">
    `;

    mainLogo.innerHTML = `
      <img
      src="${imageSrc}"
      class="w-full h-full object-contain rounded-[25px]">
    `;

  };

  reader.readAsDataURL(file);

});

loadSavedLogo();

/* ========================= */
/* SUBJECTS BY LEVEL */
/* ========================= */

const subjectsByLevel = {

  'السنة الأولى': [
    'الرياضيات',
    'اللغة العربية',
    'الإيقاظ العلمي'
  ],

  'السنة الثانية': [
    'الرياضيات',
    'اللغة العربية',
    'الإيقاظ العلمي'
  ],

  'السنة الثالثة': [
    'الرياضيات',
    'اللغة العربية',
    'الفرنسية',
    'الإيقاظ العلمي'
  ],

  'السنة الرابعة': [
    'الرياضيات',
    'اللغة العربية',
    'الفرنسية',
    'الإيقاظ العلمي'
  ],

  'السنة الخامسة': [
    'الرياضيات',
    'اللغة العربية',
    'الفرنسية',
    'الإيقاظ العلمي'
  ],

  'السنة السادسة': [
    'الرياضيات',
    'اللغة العربية',
    'الفرنسية',
    'الإيقاظ العلمي'
  ]

};

/* ========================= */
/* CREATE SUBJECT CARD */
/* ========================= */

function createSubjectCard(subjectName){

  return `

    <div class="card-hover bg-white rounded-[30px] p-7 border border-slate-100 shadow-sm">

      <h3 class="text-3xl font-black text-blue-900 mb-3">
        ${subjectName}
      </h3>

      <p class="text-slate-500 mb-5 font-semibold">
        ملفات ودروس المادة
      </p>

      <div class="grid gap-3">

        <button class="bg-blue-100 text-blue-700 py-3 rounded-2xl font-bold">
          📘 الدروس
        </button>

        <button class="bg-yellow-100 text-yellow-700 py-3 rounded-2xl font-bold">
          📝 التمارين
        </button>

        <button class="bg-red-100 text-red-700 py-3 rounded-2xl font-bold">
          📄 الاختبارات
        </button>

        <button class="bg-green-100 text-green-700 py-3 rounded-2xl font-bold">
          🎥 الفيديوهات
        </button>

      </div>

      <div class="mt-6">

        <button class="upload-btn bg-blue-600 hover:bg-blue-700 text-white w-full py-3 rounded-2xl font-black transition">

          ⬆️ رفع الملفات

        </button>

      </div>

      <div class="files-list mt-5 space-y-3"></div>

    </div>

  `;

}

/* ========================= */
/* RENDER SUBJECTS */
/* ========================= */

function renderSubjects(levelName){

  levelPage.classList.remove('hidden');

  levelsList.classList.add('hidden');

  levelTitle.textContent = levelName;

  const subjects =
  subjectsByLevel[levelName] || [];

  levelSubjectsContainer.innerHTML = '';

  subjects.forEach(subject=>{

    levelSubjectsContainer.innerHTML +=
    createSubjectCard(subject);

  });

  attachUploadEvents();

}

/* ========================= */
/* LEVEL BUTTONS */
/* ========================= */

const levelButtons =
document.querySelectorAll('.level-btn');

levelButtons.forEach((btn)=>{

  btn.addEventListener('click',()=>{

    levelButtons.forEach((b)=>{

      b.classList.remove('active-level');

    });

    btn.classList.add('active-level');

    const levelName =
    btn.textContent.trim();

    renderSubjects(levelName);

  });

});

/* ========================= */
/* FILES */
/* ========================= */

function attachUploadEvents(){

  document
  .querySelectorAll('.upload-btn')
  .forEach((button)=>{

    button.onclick = null;

    button.addEventListener('click',()=>{

      const input =
      document.createElement('input');

      input.type='file';

      input.accept =
      '.pdf,.doc,.docx,.png,.jpg,.jpeg,.mp4';

      input.addEventListener('change',(e)=>{

        const file =
        e.target.files[0];

        if(!file) return;

        const card =
        button.closest('.card-hover');

        const filesList =
        card.querySelector('.files-list');

        const fileURL =
        URL.createObjectURL(file);

        const item =
        document.createElement('div');

        item.className =
        'bg-slate-100 rounded-2xl p-4 flex items-center justify-between gap-3';

        item.innerHTML = `

          <a
          href="${fileURL}"
          target="_blank"
          class="text-blue-700 font-bold break-all flex-1">

            📄 ${file.name}

          </a>

          <div class="flex gap-2">

            <a
            href="${fileURL}"
            download="${file.name}"
            class="bg-green-600 hover:bg-green-700 text-white px-3 py-2 rounded-xl text-sm font-bold">

              تحميل

            </a>

            <button
            class="delete-btn bg-red-600 hover:bg-red-700 text-white px-3 py-2 rounded-xl text-sm font-bold">

              🗑️

            </button>

          </div>

        `;

        item.querySelector('.delete-btn')
        .addEventListener('click',()=>{

          item.remove();

        });

        filesList.appendChild(item);

      });

      input.click();

    });

  });

}

</script>
